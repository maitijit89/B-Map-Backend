name: B-Map Backend CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-audit:
    name: Code Quality & Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

      - name: Run style checks (Flake8)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Security Audit (Bandit)
        run: |
          bandit -r app/ -x tests/ -ll

  run-tests:
    name: Automated Testing Suite
    runs-on: ubuntu-latest
    needs: lint-and-audit
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install application dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Pytest Suite
        env:
          ENV: testing
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET_KEY: test_secret_key_for_ci_cd_pipeline_verification
        run: |
          python -m pytest

  docker-build:
    name: Production Container Compilation check
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and compile Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: b-map-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
