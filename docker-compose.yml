version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: b-map-backend
    ports:
      - "8080:8080"
    environment:
      - ENV=production
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=b_map
      - REDIS_URL=redis://redis:6379
      - PORT=8080
    depends_on:
      - mongodb
      - redis
    restart: always

  mongodb:
    image: mongo:7.0
    container_name: b-map-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7-alpine
    container_name: b-map-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mongo_data:
