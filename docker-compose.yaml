version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: b_map_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-b_map}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - b_map_network

  redis:
    image: redis:7-alpine
    container_name: b_map_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - b_map_network

networks:
  b_map_network:
    driver: bridge

volumes:
  postgres_data:
